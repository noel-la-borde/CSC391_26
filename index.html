<!DOCTYPE html>
<html>
<head>
  <title>Noel La Borde Project</title>
  <meta charset="utf-8">
  <style>
    body { margin: 0; overflow: hidden; }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="container"></div>


<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;


// Basketball variables
let ball;
let clock = new THREE.Clock();
let velocity = 0;
const gravity = -0.01;
const bounce = 0.85;
const floorLevel = 0.3; 

init();
animate();

function init() {
  const container = document.getElementById('container');

  // My scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050505);

  // My camera
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(5, 4, 8);

  // My renderer
  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  // My controls
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // My lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambient);

  const pointLight = new THREE.PointLight(0xff8800, 50, 100);
  pointLight.position.set(2, 5, 2);
  pointLight.castShadow = true;
  scene.add(pointLight);

  // My floor textures stolen (taken) from https://threejs.org/examples/#webgpu_lights_physical. 
  const loader = new THREE.TextureLoader();
  const woodColor = loader.load('Textures/hardwood2_diffuse.jpg');
  const woodBump = loader.load('Textures/hardwood2_bump.jpg');
  const woodRough = loader.load('Textures/hardwood2_roughness.jpg');

  // My basketball texture, downloaded online from Adobe Stock. 
  
  const loader2 = new THREE.TextureLoader();
  const ballTexture = loader2.load('Textures/basketball.jpg');
  
  const ballGeometry = new THREE.SphereGeometry(0.3, 64, 64);
  const ballMaterial = new THREE.MeshStandardMaterial({
  map: ballTexture,
  roughness: 0.5,
  metalness: 0.2
});

  ball = new THREE.Mesh(ballGeometry, ballMaterial);
  ball.position.set(0, 3, 0);
  ball.castShadow = true;
  scene.add(ball);

  // Repeated floor textures
  [woodColor, woodBump, woodRough].forEach(tex => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(10, 10);
  });

  woodColor.colorSpace = THREE.SRGBColorSpace;

  const floorMat = new THREE.MeshStandardMaterial({
    map: woodColor,
    bumpMap: woodBump,
    roughnessMap: woodRough,
    roughness: 0.8,
    metalness: 0.2
  });

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(17, 20), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

   // My basketball court lines
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
  const lines = [];

  // My sidelines and baseline (half court)
  const outlinePoints = [
    new THREE.Vector3(-5.5, 0.01, -7),
    new THREE.Vector3(5.5, 0.01, -7),
    new THREE.Vector3(5.5, 0.01, 7),
    new THREE.Vector3(-5.5, 0.01, 7),
    new THREE.Vector3(-5.5, 0.01, -7)
  ];
  const outlineGeom = new THREE.BufferGeometry().setFromPoints(outlinePoints);
  scene.add(new THREE.Line(outlineGeom, lineMaterial));

  // My free throw semicircle
  const arcPoints = [];
  const radius = 3.4;
  const center = new THREE.Vector3(0, 0.08, -6.2);
  for(let i=-Math.PI/13.8; i<=Math.PI/0.9; i+=0.2) {
    arcPoints.push(new THREE.Vector3(center.x + Math.cos(i)*radius, center.y, center.z + Math.sin(i)*radius));
  }
  const arcGeom = new THREE.BufferGeometry().setFromPoints(arcPoints);
  scene.add(new THREE.Line(arcGeom, lineMaterial));

  // My basketball hoop, backboard, and pole
  const backboard = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 1.05, 0.05),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  backboard.position.set(0, 3, -6.8);
  backboard.castShadow = true;
  scene.add(backboard);

  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(0.45, 0.03, 16, 100),
    new THREE.MeshStandardMaterial({ color: 0xff4500 })
  );
  rim.rotation.x = Math.PI/2;
  rim.position.set(0, 2.9, -6.39);
  rim.castShadow = true;
  scene.add(rim);

  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 2.5, 0.4),
    new THREE.MeshStandardMaterial({ color: 0xff4500 })
  );
  cube.position.set(0, 1.2, -7.22);
  cube.castShadow = true;
  scene.add(cube);  

  const cube2 = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.5, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x080707 })
  );
  cube2.position.set(0, 2.7, -7.13);
  cube2.castShadow = true;
  scene.add(cube2); 




  // Handle window resize
  window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
 
  const time = clock.getElapsedTime();

  // Vertical bounce loop
  ball.position.y = 0.3 + Math.abs(Math.sin(time * 3)) * 1.7;

  // Basketball rotation while bouncing
  ball.rotation.x += 0.1;
  ball.rotation.z += 0.05;

  controls.update();
  renderer.render(scene, camera);
}
</script>
</body>
</html>
